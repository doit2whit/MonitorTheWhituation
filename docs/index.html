<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor the Whituation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #131a2b;
            --bg-card-hover: #1a2340;
            --border: #1e2a45;
            --text-primary: #e2e8f0;
            --text-secondary: #8892a8;
            --text-muted: #5a6478;
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --yellow: #eab308;
            --yellow-bg: rgba(234, 179, 8, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Overall assessment banner */
        .assessment {
            max-width: 1200px;
            margin: 0 auto 32px auto;
            padding: 20px 28px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .assessment.critical { background: var(--red-bg); border-color: var(--red); }
        .assessment.elevated { background: var(--yellow-bg); border-color: var(--yellow); }
        .assessment.caution { background: rgba(234, 179, 8, 0.05); border-color: #78650a; }
        .assessment.stable { background: var(--green-bg); border-color: var(--green); }

        .assessment-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        .critical .assessment-dot { background: var(--red); }
        .elevated .assessment-dot { background: var(--yellow); }
        .caution .assessment-dot { background: var(--yellow); opacity: 0.7; }
        .stable .assessment-dot { background: var(--green); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .assessment-text {
            font-size: 16px;
            font-weight: 600;
        }

        .assessment-meta {
            margin-left: auto;
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .refresh-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .refresh-btn.loading {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Category sections */
        .category {
            max-width: 1200px;
            margin: 0 auto 28px auto;
        }

        .category-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding-left: 4px;
        }

        .category-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            padding-left: 4px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* Metric cards — flip container */
        .card-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-container:hover .card-inner {
            transform: translateY(-3px);
        }

        .card-container.flipped:hover .card-inner {
            transform: rotateY(180deg) translateY(-3px);
        }

        .card-container:hover {
            filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.3));
        }

        .card-front, .card-back {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-front {
            position: relative;
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotateY(180deg);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .card-front:hover, .card-back:hover {
            background: var(--bg-card-hover);
        }

        /* Flip hint */
        .flip-hint {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card-container:hover .flip-hint {
            opacity: 1;
        }

        .card-container.flipped .flip-hint-front {
            opacity: 0 !important;
        }

        /* Back side styles */
        .back-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .back-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .back-close-hint {
            font-size: 11px;
            color: var(--text-muted);
        }

        .back-section {
            margin-bottom: 14px;
        }

        .back-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--blue);
            margin-bottom: 6px;
        }

        .back-section p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .back-example {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .back-example-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--yellow);
            margin-bottom: 6px;
        }

        .back-example p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .zone-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .zone-badge.green { background: var(--green); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
        .zone-badge.yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }
        .zone-badge.red { background: var(--red); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 2px;
            letter-spacing: -1px;
        }

        .card-value.green { color: var(--green); }
        .card-value.yellow { color: var(--yellow); }
        .card-value.red { color: var(--red); }

        .card-unit {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .contract-label {
            color: var(--text-secondary);
        }

        .card-chart {
            width: 100%;
            height: 80px;
            margin-bottom: 12px;
        }

        .card-description {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .card-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .estimated-badge {
            font-size: 10px;
            color: var(--yellow);
            background: var(--yellow-bg);
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 4px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .card-source {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-source a {
            color: var(--blue);
            text-decoration: none;
            opacity: 0.7;
        }

        .card-source a:hover { opacity: 1; }

        .card-source a.live-link {
            color: var(--green);
            opacity: 0.8;
        }

        .card-freq {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            padding: 2px 7px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* History notes tooltip */
        .history-notes {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .history-notes-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .history-note {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .history-note span {
            color: var(--text-muted);
        }

        /* Threshold legend */
        .threshold-bar {
            display: flex;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            gap: 2px;
        }

        .threshold-segment {
            flex: 1;
            border-radius: 2px;
        }

        .threshold-segment.green { background: var(--green); opacity: 0.85; }
        .threshold-segment.yellow { background: var(--yellow); opacity: 0.85; }
        .threshold-segment.red { background: var(--red); opacity: 0.85; }

        .threshold-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .threshold-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Loading state */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Error state */
        .error-banner {
            max-width: 1200px;
            margin: 0 auto 24px auto;
            padding: 16px 20px;
            background: var(--red-bg);
            border: 1px solid var(--red);
            border-radius: 8px;
            color: var(--red);
            font-size: 14px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .cards { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .cards { grid-template-columns: 1fr; }
            body { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monitor the Whituation</h1>
        <div class="subtitle">Strait of Hormuz Crisis — Economic Impact Dashboard</div>
    </div>

    <div id="error-banner" class="error-banner"></div>
    <div id="assessment"></div>
    <div id="content">
        <div class="loading-screen">
            <div class="spinner"></div>
            <div class="loading-text">Fetching latest data...</div>
        </div>
    </div>

    <script>
        // Metric ordering and grouping
        const CATEGORIES = [
            {
                name: "Energy Markets",
                subtitle: "Leading indicators — these move within hours of a disruption. Even a single-day spike can signal real trouble, though sustained elevation over 1-2 weeks confirms the crisis isn't just a scare.",
                keys: ["brent_crude", "crack_spread", "calendar_spread"]
            },
            {
                name: "Economic Stress",
                subtitle: "Lagging indicators — these move weeks to months after an energy shock takes hold. By the time these deteriorate, the damage is already baked in. Watch for the direction of change more than any single reading.",
                keys: ["industrial_production", "eu_natural_gas", "capacity_utilization"]
            },
            {
                name: "Financial Contagion",
                subtitle: "Mixed-speed indicators — credit spreads can blow out overnight (leading), while jobless claims take weeks and inflation expectations take months. If all three move together, the crisis has spread beyond energy into the broader economy.",
                keys: ["hy_credit_spread", "jobless_claims", "inflation_expectations"]
            },
            {
                name: "Private Credit",
                subtitle: "Daily market-priced signals reflecting investor sentiment about private lending. BDCs (Business Development Companies) are the publicly traded tip of the $1.7T private credit market — when their stock prices drop, investors are pricing in expected loan losses across a sector that's largely opaque. Watch for all three moving down together.",
                keys: ["bizd_etf", "arcc", "main_street"]
            }
        ];

        const SOURCES = {
            brent_crude: { label: "FRED: DCOILBRENTEU", url: "https://fred.stlouisfed.org/series/DCOILBRENTEU", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/ICEEUR-BRN1!/", liveLabel: "Trades live" },
            crack_spread: { label: "FRED (calculated)", url: "https://fred.stlouisfed.org/series/DCOILBRENTEU", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/NYMEX-RB1!/", liveLabel: "Gasoline trades live" },
            calendar_spread: { label: "Yahoo Finance", url: "https://finance.yahoo.com/quote/BZ=F/", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/ICEEUR-BRN1!/contracts/", liveLabel: "Contracts trade live" },
            industrial_production: { label: "FRED: INDPRO", url: "https://fred.stlouisfed.org/series/INDPRO", freq: "Monthly" },
            eu_natural_gas: { label: "FRED: PNGASEUUSDM", url: "https://fred.stlouisfed.org/series/PNGASEUUSDM", freq: "Monthly", liveUrl: "https://www.tradingview.com/symbols/ICEEUR-TFN1!/", liveLabel: "Trades live" },
            capacity_utilization: { label: "FRED: TCU", url: "https://fred.stlouisfed.org/series/TCU", freq: "Monthly" },
            hy_credit_spread: { label: "FRED: BAMLH0A0HYM2", url: "https://fred.stlouisfed.org/series/BAMLH0A0HYM2", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/FRED-BAMLH0A0HYM2/", liveLabel: "Trades live" },
            jobless_claims: { label: "FRED: ICSA", url: "https://fred.stlouisfed.org/series/ICSA", freq: "Weekly" },
            inflation_expectations: { label: "FRED: MICH", url: "https://fred.stlouisfed.org/series/MICH", freq: "Monthly" },
            bizd_etf: { label: "Yahoo Finance: BIZD", url: "https://finance.yahoo.com/quote/BIZD/", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/AMEX-BIZD/", liveLabel: "Trades live" },
            arcc: { label: "Yahoo Finance: ARCC", url: "https://finance.yahoo.com/quote/ARCC/", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/NASDAQ-ARCC/", liveLabel: "Trades live" },
            main_street: { label: "Yahoo Finance: MAIN", url: "https://finance.yahoo.com/quote/MAIN/", freq: "Daily", liveUrl: "https://www.tradingview.com/symbols/NYSE-MAIN/", liveLabel: "Trades live" },
        };

        const CARD_BACKS = {
            brent_crude: {
                what: "Brent Crude is the global benchmark price for oil, set by trading on the Intercontinental Exchange. It reflects the market's consensus on what a barrel of oil is worth right now, factoring in supply, demand, and geopolitical risk.",
                why: "The Strait of Hormuz carries roughly 20% of the world's oil supply. When that chokepoint is threatened, Brent is the first number to move. It's the headline price that drives gasoline costs, shipping rates, and inflation expectations worldwide.",
                example_label: "July 2008 — Oil hits $147/barrel",
                example: "Surging demand from China, supply fears, and speculation drove oil to an all-time high. U.S. gasoline hit $4.11/gallon. The shock contributed to the consumer spending collapse that deepened the financial crisis months later. Prices then crashed to $32/barrel by December as demand evaporated."
            },
            crack_spread: {
                what: "The 3-2-1 crack spread measures the profit margin refineries earn by \"cracking\" 3 barrels of crude oil into 2 barrels of gasoline and 1 barrel of diesel. When this number is high, refineries are struggling to keep up with demand for finished fuel.",
                why: "A rising crude price is concerning, but a blowing-out crack spread is worse — it means the bottleneck isn't just oil supply, it's the entire refining system. If refineries can't source enough crude (because tankers can't transit Hormuz), the crack spread explodes even as crude prices rise.",
                example_label: "June 2022 — Crack spread hits $60/barrel",
                example: "After Russia invaded Ukraine and Western sanctions disrupted fuel trade flows, diesel became critically scarce. U.S. East Coast diesel inventories hit their lowest since 1990. The crack spread tripled from normal levels as refineries literally couldn't make enough fuel. Diesel prices at the pump hit $5.81/gallon, hammering trucking, agriculture, and food prices."
            },
            calendar_spread: {
                what: "This is the price difference between oil for delivery next month versus two months from now. When the near-term price is higher (called \"backwardation\"), it means buyers are paying a premium to get oil right now rather than waiting.",
                why: "This is the market's real-time vote on how tight physical supply is. Futures prices can be driven by speculation, but the calendar spread reflects actual urgency from refiners and traders who need physical barrels. A large positive spread means \"we need oil NOW and we'll pay extra for it.\"",
                example_label: "March 2022 — Backwardation hits ~$5/barrel",
                example: "Immediately after Russia's invasion of Ukraine, buyers scrambled to lock in physical barrels as they feared Russian oil would vanish from the market. The Brent calendar spread spiked to ~$5/barrel, its widest in over a decade. Traders were paying massive premiums for immediate delivery, signaling genuine panic about near-term supply."
            },
            industrial_production: {
                what: "The Industrial Production Index measures the real (inflation-adjusted) output of U.S. factories, mines, and utilities. It's published monthly by the Federal Reserve and indexed so that 2017 = 100.",
                why: "This is our clearest signal for whether the energy shock is causing real economic damage beyond just higher prices. If factories start producing less because energy costs make it unprofitable, it confirms the crisis is moving from \"annoying\" to \"recessionary.\" This metric moves slowly (monthly), so by the time it drops, the problem is well-established.",
                example_label: "April 2020 — Index drops to 86.9",
                example: "COVID lockdowns caused the sharpest single-month drop in industrial production since WWII. Factories shut down not because of energy costs but because of mandated closures and collapsed demand. The index fell 12.7% in one month. For comparison, the 2008 financial crisis caused a gradual decline from 101 to 87 over 18 months — a slower bleed but equally devastating."
            },
            eu_natural_gas: {
                what: "This tracks the price of natural gas delivered to Europe, measured in dollars per million British thermal units (MMBtu). Europe imports most of its gas via pipeline or LNG tanker, making it highly sensitive to supply disruptions.",
                why: "European natural gas is the canary in the coal mine for industrial shutdowns. Fertilizer plants, chemical refineries, and aluminum smelters are massive gas consumers. When gas prices spike, these plants shut down because operating at a loss is worse than not operating at all. Those shutdowns create cascading shortages 3-6 months later in food, plastics, and construction materials.",
                example_label: "August 2022 — European gas hits ~$70/MMBtu",
                example: "After Russia cut gas flows through Nord Stream, European gas prices hit 14x their normal level. BASF (the world's largest chemical company) cut production at its flagship German plant. Norwegian fertilizer giant Yara halved output. Aluminum smelters across Europe shut down. The EU spent over €800 billion on emergency energy subsidies to prevent broader economic collapse."
            },
            capacity_utilization: {
                what: "This measures what percentage of America's total industrial capacity is actually being used. Think of it like a restaurant: if you have 100 seats but only 77 are filled on a typical night, your capacity utilization is 77%.",
                why: "This is the companion to Industrial Production — it tells us whether factories are slowing down. A gradual decline from 77% toward 73% signals that companies are pulling back. Below 73%, it historically correlates with recession. It's also a leading indicator for layoffs: companies reduce shifts before they fire people.",
                example_label: "April 2020 — Utilization drops to 64.2%",
                example: "COVID shutdowns pushed capacity utilization to its lowest reading ever recorded (data goes back to 1967). Over a third of American industrial capacity sat idle. During the 2008-09 recession, it bottomed at 66.7% — slightly less extreme but sustained over a longer period, which caused deeper structural damage to manufacturing employment."
            },
            hy_credit_spread: {
                what: "This measures the extra interest rate (in basis points, where 100 bps = 1%) that risky companies must pay to borrow money, compared to ultra-safe U.S. Treasury bonds. It's essentially the market's price tag on corporate default risk.",
                why: "Many companies — especially in tech, retail, and energy — rely on constantly rolling over debt. If lenders get scared and demand higher rates, companies that were barely profitable suddenly can't refinance. This is how an energy shock turns into a broader financial crisis: rising costs squeeze profits, lenders pull back, and a credit crunch triggers defaults and layoffs.",
                example_label: "December 2008 — Spread hits 2,100 basis points",
                example: "After Lehman Brothers collapsed, the high-yield bond market effectively froze. Companies couldn't borrow at any price. The spread hit 21% above Treasuries — meaning a company that previously paid 7% interest now faced 26%. This triggered a wave of corporate bankruptcies (Circuit City, Lehman, Washington Mutual) and froze hiring across the economy. Even healthy companies hoarded cash rather than invest."
            },
            jobless_claims: {
                what: "This counts the number of Americans filing for unemployment benefits for the first time each week. It's one of the fastest-moving economic indicators because it's reported weekly with almost no delay.",
                why: "This is our early warning system for whether the crisis is hitting ordinary workers. Energy shocks typically cause layoffs in a predictable sequence: first transportation and logistics, then manufacturing, then retail and services. A sustained rise above 300K weekly claims historically signals recession is either imminent or already underway.",
                example_label: "March 2020 — Claims spike to 6.87 million in one week",
                example: "In the week ending March 28, 2020, nearly 6.9 million Americans filed for unemployment — roughly 33x the normal level. This remains the single worst week for job losses in U.S. history. For context, the worst week during the 2008-09 recession peaked at 665,000. The COVID spike was so extreme that it literally broke the scale on most economic charts."
            },
            inflation_expectations: {
                what: "Each month, the University of Michigan surveys consumers and asks: \"What do you think inflation will be over the next year?\" This number reflects what everyday people expect to happen to prices — and expectations can become self-fulfilling.",
                why: "This is the psychological dimension of the crisis. When consumers expect high inflation, they change behavior: buying things now before prices rise, demanding higher wages, and cutting discretionary spending. If this number climbs above 4.5%, it signals that the crisis has moved from Wall Street into kitchen-table conversations — and that behavioral shifts are likely to amplify the economic damage.",
                example_label: "April 2022 — Expectations hit 5.4%",
                example: "As gas prices surged past $5/gallon following Russia's invasion of Ukraine, consumer inflation expectations hit their highest level since 1981. This spooked the Federal Reserve into its most aggressive rate-hiking cycle in 40 years (raising rates from 0% to 5.5% in 18 months). The rate hikes were necessary to break the inflation psychology, but they also crushed the housing market and contributed to the regional banking crisis of 2023."
            },
            bizd_etf: {
                what: "BIZD is an ETF that holds shares in roughly 25 publicly traded Business Development Companies (BDCs). BDCs make floating-rate loans to mid-market companies — the same types of borrowers that private credit funds lend to. Because the ETF is traded daily on the stock exchange, it gives a real-time read on how the market values these private loan portfolios.",
                why: "Private credit is a $1.7 trillion market, but it's largely opaque — funds don't publish real-time stress data. BIZD is the publicly visible tip of that iceberg. When it drops, investors are pricing in expected loan losses across the sector. During an energy shock, companies with thin margins (many BDC borrowers) can't absorb higher fuel and input costs, leading to defaults. BIZD captures that risk in real time.",
                example_label: "March 2020 — COVID crash",
                example: "BIZD fell roughly 45% in three weeks as markets feared mass defaults among leveraged middle-market borrowers. Companies that had taken on floating-rate BDC loans suddenly faced revenue collapse while their interest payments stayed elevated. The ETF eventually recovered, but it took over a year — far slower than the S&P 500 — because actual loan losses materialized through 2020 and into 2021."
            },
            arcc: {
                what: "Ares Capital Corporation is the largest publicly traded BDC, with a portfolio exceeding $25 billion in direct loans to mid-sized companies. Ares Capital's parent company, Ares Management, was specifically named in March 2026 reports about private credit funds imposing redemption gates — trapping $5 billion of investor money behind withdrawal caps.",
                why: "ARCC's stock price reflects the market's real-time opinion on whether the private credit business model is healthy or cracking. Because Ares is the biggest player, its stock is a bellwether for the entire sector. If ARCC drops sharply, it means the market expects loan losses that would impair even the most diversified private credit portfolio.",
                example_label: "2008-2009 — Financial crisis",
                example: "ARCC fell from roughly $17 to $3 per share as the leveraged loan market froze. Companies that had borrowed from BDCs couldn't refinance, defaults spiked, and BDCs had to write down their loan portfolios. ARCC survived by cutting its dividend and raising emergency capital, but shareholders lost over 80% of their investment at the trough. The stock didn't recover to pre-crisis levels for nearly a decade."
            },
            main_street: {
                what: "Main Street Capital is a premium BDC focused on lower middle-market companies (typically $10M-$150M in revenue). Unlike most BDCs, Main Street is internally managed — meaning it doesn't pay external management fees that eat into returns. This makes it the 'blue chip' of the BDC sector, with a track record of consistent dividends and lower credit losses.",
                why: "MAIN is the canary in the BDC coal mine. Because it's considered the highest-quality name in the sector, a significant drop in MAIN signals that the market isn't just worried about junk-tier private loans — it's pricing in broad distress across all of private credit. When even the best-run BDC gets sold off, it means investors believe the entire lending environment has deteriorated.",
                example_label: "March 2020 — COVID panic selling",
                example: "MAIN fell roughly 50% in weeks despite having one of the strongest portfolios in the BDC sector. This showed that during a true crisis, panic selling doesn't discriminate between quality and junk — everything gets hit. MAIN's actual credit losses turned out to be modest (its strong underwriting paid off), but the stock price crash was a real-time signal that investors feared the worst for all private lending."
            }
        };

        let charts = {};

        async function fetchData() {
            // Try static data.json first (GitHub Pages), fall back to API (local dev)
            let resp = await fetch("data.json");
            if (!resp.ok) {
                resp = await fetch("/api/data");
            }
            if (!resp.ok) throw new Error(`Failed to load data: ${resp.status}`);
            return resp.json();
        }

        function showError(msg) {
            const el = document.getElementById("error-banner");
            el.textContent = msg;
            el.style.display = "block";
        }

        function formatValue(value, unit) {
            if (value === null || value === undefined) return "—";
            if (unit === "$/barrel") return "$" + value.toFixed(2);
            if (unit === "$/MMBtu") return "$" + value.toFixed(2);
            if (unit === "$/share") return "$" + value.toFixed(2);
            if (unit === "%") return value.toFixed(1) + "%";
            if (unit === "basis points") return Math.round(value) + " bps";
            if (unit === "thousands") return value.toFixed(0) + "K";
            if (unit.startsWith("Index")) return value.toFixed(1);
            return value.toFixed(2);
        }

        const ZONE_COLORS = {
            green: { solid: "rgb(34, 197, 94)", fill: "rgba(34, 197, 94, 0.25)" },
            yellow: { solid: "rgb(234, 179, 8)", fill: "rgba(234, 179, 8, 0.25)" },
            red: { solid: "rgb(239, 68, 68)", fill: "rgba(239, 68, 68, 0.25)" },
        };

        function getZoneColor(zone) {
            return ZONE_COLORS[zone]?.solid || ZONE_COLORS.red.solid;
        }

        function buildAssessment(overall, lastUpdated) {
            const el = document.getElementById("assessment");
            const time = new Date(lastUpdated).toLocaleString();
            el.innerHTML = `
                <div class="assessment ${overall.level}">
                    <div class="assessment-dot"></div>
                    <div class="assessment-text">${overall.label}</div>
                    <div class="assessment-meta">
                        Data as of ${time}
                    </div>
                </div>
            `;
        }

        function buildThresholdBar(thresholds) {
            const dir = thresholds.direction;
            if (dir === "up_is_bad") {
                return `
                    <div class="threshold-bar">
                        <div class="threshold-segment green"></div>
                        <div class="threshold-segment yellow"></div>
                        <div class="threshold-segment red"></div>
                    </div>
                    <div class="threshold-labels">
                        <span class="threshold-label">0</span>
                        <span class="threshold-label">${thresholds.green_max}</span>
                        <span class="threshold-label">${thresholds.yellow_max}</span>
                        <span class="threshold-label"></span>
                    </div>
                `;
            } else {
                return `
                    <div class="threshold-bar">
                        <div class="threshold-segment red"></div>
                        <div class="threshold-segment yellow"></div>
                        <div class="threshold-segment green"></div>
                    </div>
                    <div class="threshold-labels">
                        <span class="threshold-label"></span>
                        <span class="threshold-label">${thresholds.yellow_min}</span>
                        <span class="threshold-label">${thresholds.green_min}</span>
                        <span class="threshold-label"></span>
                    </div>
                `;
            }
        }

        function buildHistoryNotes(notes) {
            if (!notes || Object.keys(notes).length === 0) return "";
            let html = `<div class="history-notes"><div class="history-notes-title">Historical Context</div>`;
            for (const [date, note] of Object.entries(notes)) {
                html += `<div class="history-note"><span>${date}:</span> ${note}</div>`;
            }
            html += "</div>";
            return html;
        }

        function createSparkline(canvas, data, zone, thresholds) {
            const ctx = canvas.getContext("2d");
            const color = getZoneColor(zone);

            const labels = data.map(d => d.date);
            const values = data.map(d => d.value);

            // Add threshold lines as annotations
            const annotations = {};
            if (thresholds.direction === "up_is_bad") {
                annotations.greenLine = {
                    type: "line", yMin: thresholds.green_max, yMax: thresholds.green_max,
                    borderColor: "rgba(34, 197, 94, 0.3)", borderWidth: 1, borderDash: [4, 4]
                };
                annotations.yellowLine = {
                    type: "line", yMin: thresholds.yellow_max, yMax: thresholds.yellow_max,
                    borderColor: "rgba(239, 68, 68, 0.3)", borderWidth: 1, borderDash: [4, 4]
                };
            } else {
                annotations.greenLine = {
                    type: "line", yMin: thresholds.green_min, yMax: thresholds.green_min,
                    borderColor: "rgba(34, 197, 94, 0.3)", borderWidth: 1, borderDash: [4, 4]
                };
                annotations.yellowLine = {
                    type: "line", yMin: thresholds.yellow_min, yMax: thresholds.yellow_min,
                    borderColor: "rgba(239, 68, 68, 0.3)", borderWidth: 1, borderDash: [4, 4]
                };
            }

            return new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: color,
                        backgroundColor: ZONE_COLORS[zone]?.fill || ZONE_COLORS.red.fill,
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHitRadius: 8,
                        fill: true,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        annotation: { annotations },
                        tooltip: {
                            mode: "index",
                            intersect: false,
                            callbacks: {
                                title: (items) => items[0]?.label || "",
                                label: (item) => item.parsed.y.toFixed(2),
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            display: false,
                            beginAtZero: false,
                        }
                    },
                    interaction: {
                        mode: "nearest",
                        axis: "x",
                        intersect: false,
                    }
                }
            });
        }

        function buildCard(key, metric) {
            if (!metric) return `<div class="card-container"><div class="card-inner"><div class="card-front"><div class="card-name">Data unavailable</div></div></div></div>`;

            const zone = metric.zone || "unknown";
            const source = SOURCES[key] || {};
            const formattedVal = formatValue(metric.current_value, metric.unit);
            const canvasId = `chart-${key}`;
            const back = CARD_BACKS[key] || {};

            return `
                <div class="card-container" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-header">
                                <div class="card-name">${metric.name}<span class="card-freq">${source.freq || "—"}</span></div>
                                <div class="zone-badge ${zone}"></div>
                            </div>
                            <div class="card-value ${zone}">${formattedVal}</div>
                            <div class="card-unit">${metric.unit}${metric.contracts ? ` <span class="contract-label">&middot; ${metric.contracts}</span>` : ''}</div>
                            <div class="card-chart">
                                <canvas id="${canvasId}"></canvas>
                            </div>
                            <div class="card-description">${metric.description}</div>
                            ${buildThresholdBar(metric.thresholds)}
                            ${buildHistoryNotes(metric.history_notes)}
                            <div class="card-date">Latest: ${metric.current_date || "—"}${metric.current_estimated ? ' <span class="estimated-badge">est.</span>' : ''}</div>
                            <div class="card-source">
                                Source: <a href="${source.url || "#"}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${source.label || "—"}</a>
                                ${source.liveUrl ? `&nbsp;·&nbsp;<a href="${source.liveUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="live-link">${source.liveLabel}</a>` : ""}
                            </div>
                            <div class="flip-hint flip-hint-front">ℹ Click to learn more</div>
                        </div>
                        <div class="card-back">
                            <div class="back-header">
                                <div class="back-title">${metric.name}</div>
                                <div class="back-close-hint">Click to flip back</div>
                            </div>
                            <div class="back-section">
                                <div class="back-section-title">What This Measures</div>
                                <p>${back.what || ""}</p>
                            </div>
                            <div class="back-section">
                                <div class="back-section-title">Why We're Watching It</div>
                                <p>${back.why || ""}</p>
                            </div>
                            <div class="back-example">
                                <div class="back-example-label">${back.example_label || "Historical Example"}</div>
                                <p>${back.example || ""}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadDashboard() {
            try {
                const data = await fetchData();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Build assessment
                buildAssessment(data.overall, data.last_updated);

                // Build cards grouped by category
                let html = "";
                for (const cat of CATEGORIES) {
                    html += `<div class="category">`;
                    html += `<div class="category-title">${cat.name}</div>`;
                    html += `<div class="category-subtitle">${cat.subtitle}</div>`;
                    html += `<div class="cards">`;
                    for (const key of cat.keys) {
                        html += buildCard(key, data.metrics[key]);
                    }
                    html += `</div></div>`;
                }

                document.getElementById("content").innerHTML = html;

                // Destroy old charts
                for (const c of Object.values(charts)) c.destroy();
                charts = {};

                // Create sparklines
                for (const cat of CATEGORIES) {
                    for (const key of cat.keys) {
                        const metric = data.metrics[key];
                        if (!metric || !metric.recent) continue;
                        const canvas = document.getElementById(`chart-${key}`);
                        if (canvas) {
                            charts[key] = createSparkline(canvas, metric.recent, metric.zone, metric.thresholds);
                        }
                    }
                }

            } catch (e) {
                showError("Failed to load data: " + e.message);
                console.error(e);
            }
        }

        // Initial load
        loadDashboard();
    </script>
</body>
</html>
